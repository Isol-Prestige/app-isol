<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isolation Pro - App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-blue-700 text-white p-4 shadow-lg mb-6">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-bold text-xl">Isolation Estimator</h1>
            <div class="space-x-4 text-sm md:text-base">
                <button onclick="showSection('devis')" class="bg-blue-800 px-3 py-1 rounded">Devis</button>
                <button onclick="showSection('config')" class="bg-blue-800 px-3 py-1 rounded">Réglages Prix</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 pb-20">
        
        <section id="section-devis" class="block space-y-4">
            <div class="bg-white p-6 rounded-xl shadow-md">
                <h2 class="text-xl font-bold mb-4 text-blue-700">Nouvelle Estimation</h2>
                <div class="space-y-4">
                    <input type="text" id="clientName" placeholder="Nom du Client" class="w-full border p-3 rounded-lg text-lg">
                    <input type="number" id="surface" placeholder="Surface totale (m²)" class="w-full border p-3 rounded-lg text-lg">
                    <select id="prestation" class="w-full border p-3 rounded-lg text-lg bg-white">
                        <option value="">-- Choisir une prestation --</option>
                    </select>
                    <button onclick="calculerEstimation()" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-green-700">
                        CALCULER & RÉSUMER
                    </button>
                </div>
            </div>

            <div id="resultat" class="hidden bg-white p-6 rounded-xl shadow-inner border-t-4 border-green-500">
                <div id="summaryText" class="text-gray-800 font-medium"></div>
                <button onclick="sendWhatsApp()" class="mt-6 w-full bg-green-500 text-white py-3 rounded-lg font-bold flex items-center justify-center gap-2">
                    ENVOYER WHATSAPP
                </button>
            </div>
        </section>

        <section id="section-config" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-xl shadow-md">
                <h2 class="text-xl font-bold mb-4 text-blue-700">Gestion des Tarifs m²</h2>
                <div class="grid grid-cols-1 gap-3">
                    <input type="text" id="newLabel" placeholder="Nom (ex: Isolation Graphite)" class="border p-3 rounded-lg">
                    <input type="number" id="newPrice" placeholder="Prix au m² (€)" class="border p-3 rounded-lg">
                    <button onclick="savePrice()" class="bg-blue-600 text-white py-3 rounded-lg font-bold">AJOUTER LE PRIX</button>
                </div>
            </div>
            <div class="bg-white p-4 rounded-xl">
                <h3 class="font-bold mb-2">Tarifs enregistrés :</h3>
                <ul id="priceList" class="divide-y divide-gray-100"></ul>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBeSwiReLvYaV47FSQKLTGEo0ynA8gM1f8",
            authDomain: "app-isol.firebaseapp.com",
            projectId: "app-isol",
            storageBucket: "app-isol.firebasestorage.app",
            messagingSenderId: "49748280512",
            appId: "1:49748280512:web:76e89909bf358434689925"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Navigation
        window.showSection = (id) => {
            document.getElementById('section-devis').style.display = (id === 'devis' ? 'block' : 'none');
            document.getElementById('section-config').style.display = (id === 'config' ? 'block' : 'none');
        };

        // Sauvegarder un prix
        window.savePrice = async function() {
            const label = document.getElementById('newLabel').value;
            const price = document.getElementById('newPrice').value;
            if(label && price) {
                await addDoc(collection(db, "tarifs"), { nom: label, prix: parseFloat(price) });
                document.getElementById('newLabel').value = "";
                document.getElementById('newPrice').value = "";
                alert("Nouveau tarif ajouté !");
            }
        };

        // Charger les tarifs en temps réel
        onSnapshot(collection(db, "tarifs"), (snapshot) => {
            const list = document.getElementById('priceList');
            const select = document.getElementById('prestation');
            list.innerHTML = "";
            select.innerHTML = '<option value="">-- Choisir une prestation --</option>';
            snapshot.forEach((doc) => {
                const data = doc.data();
                list.innerHTML += `<li class="py-2 flex justify-between"><span>${data.nom}</span> <b>${data.prix}€</b></li>`;
                select.innerHTML += `<option value="${data.prix}" data-name="${data.nom}">${data.nom} (${data.prix}€/m²)</option>`;
            });
        });

        // Calculer l'estimation
        window.calculerEstimation = () => {
            const name = document.getElementById('clientName').value;
            const surf = document.getElementById('surface').value;
            const price = document.getElementById('prestation').value;
            const prestName = document.getElementById('prestation').options[document.getElementById('prestation').selectedIndex].getAttribute('data-name');

            if(!name || !surf || !price) return alert("Remplissez tout !");

            const total = surf * price;
            const texte = `📋 ESTIMATION ISOLATION\nClient : ${name}\nPrestation : ${prestName}\nSurface : ${surf} m²\nPrix m² : ${price}€\n--------------------\nTOTAL ESTIMÉ : ${total}€ HT`;
            
            document.getElementById('summaryText').innerText = texte;
            document.getElementById('resultat').classList.remove('hidden');
            window.lastEstimation = texte;
        };

        // Envoyer sur WhatsApp
        window.sendWhatsApp = () => {
            const url = "https://wa.me/?text=" + encodeURIComponent(window.lastEstimation);
            window.open(url, '_blank');
        };
    </script>
</body>
</html>
