<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isol-Prestige - Devis Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

    <nav class="bg-slate-900 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-bold border-l-4 border-orange-500 pl-3">ISOL-PRESTIGE <span class="text-orange-500 text-xs">OFFICIEL</span></h1>
            <div class="flex gap-2">
                <button onclick="showSection('devis')" class="text-xs bg-slate-800 px-3 py-2 rounded">NOUVEAU DEVIS</button>
                <button onclick="showSection('history')" class="text-xs bg-slate-800 px-3 py-2 rounded">HISTORIQUE</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 mt-6 max-w-2xl">
        
        <section id="section-devis" class="space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-sm font-bold text-slate-400 uppercase mb-4 tracking-widest">Informations Client</h2>
                <div class="grid gap-4">
                    <input type="text" id="clientName" placeholder="Nom du Client" class="w-full border-b p-2 focus:outline-none focus:border-orange-500 bg-slate-50">
                    <input type="text" id="clientAddress" placeholder="Adresse du chantier (ex: 2 rue du Saumon)" class="w-full border-b p-2 focus:outline-none focus:border-orange-500 bg-slate-50">
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 space-y-6">
                <h2 class="text-sm font-bold text-slate-400 uppercase mb-2 tracking-widest">Détails du Chantier</h2>
                
                <div class="flex items-center justify-between gap-4 p-3 bg-slate-50 rounded-lg">
                    <div class="flex-1">
                        <label class="font-bold text-slate-700">Échafaudage & Préparation</label>
                        <p class="text-xs text-slate-500">Forfait montage + protection ouvrages</p>
                    </div>
                    <input type="number" id="qty_prepa" placeholder="m²" class="w-20 p-2 border rounded">
                </div>

                <div class="flex items-center justify-between gap-4 p-3 bg-slate-50 rounded-lg">
                    <div class="flex-1">
                        <label class="font-bold text-slate-700">Soubassement (180mm)</label>
                        <p class="text-xs text-slate-500">Panneaux 0.034 W/(m*K)</p>
                    </div>
                    <input type="number" id="qty_soub" placeholder="m²" class="w-20 p-2 border rounded">
                </div>

                <div class="flex items-center justify-between gap-4 p-3 bg-slate-50 rounded-lg">
                    <div class="flex-1">
                        <label class="font-bold text-slate-700">Façade Graphite STO</label>
                        <p class="text-xs text-slate-500">180mm R=5,80 + Enduit Silco</p>
                    </div>
                    <input type="number" id="qty_facade" placeholder="m²" class="w-20 p-2 border rounded">
                </div>

                <div class="flex items-center justify-between gap-4 p-3 bg-slate-50 rounded-lg">
                    <div class="flex-1">
                        <label class="font-bold text-slate-700">Ébrasements (ml)</label>
                        <p class="text-xs text-slate-500">Profil arrêt menuiserie + finitions</p>
                    </div>
                    <input type="number" id="qty_ebra" placeholder="ml" class="w-20 p-2 border rounded">
                </div>

                <button onclick="genererDevisPro()" class="w-full bg-orange-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-orange-700 transition-all uppercase tracking-widest">
                    Générer le Devis Pro
                </button>
            </div>

            <div id="resultat" class="hidden bg-slate-900 text-white p-6 rounded-xl shadow-2xl font-mono text-sm overflow-hidden">
                <div id="summaryText" class="whitespace-pre-line border-l-2 border-orange-500 pl-4"></div>
                <div class="mt-6 flex gap-2">
                    <button onclick="sendWhatsApp()" class="flex-1 bg-green-600 p-3 rounded-lg font-bold flex items-center justify-center gap-2">WhatsApp</button>
                </div>
            </div>
        </section>

        <section id="section-history" class="hidden space-y-4">
            <h2 class="font-bold text-slate-700">Archives Devis</h2>
            <div id="historyList" class="space-y-3"></div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Tes clés API restent les mêmes
        const firebaseConfig = {
            apiKey: "AIzaSyBeSwiReLvYaV47FSQKLTGEo0ynA8gM1f8",
            authDomain: "app-isol.firebaseapp.com",
            projectId: "app-isol",
            storageBucket: "app-isol.firebasestorage.app",
            messagingSenderId: "49748280512",
            appId: "1:49748280512:web:76e89909bf358434689925"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- TARIFS FIXES (Basés sur ton devis pro) ---
        // Tu pourras les modifier ici si tes prix changent
        const PRIX = {
            prepa: 9.50,    // Echafaudage m²
            soub: 89.70,   // Soubassement m²
            facade: 145.00, // Système complet façade m²
            ebra: 55.00     // Ebrasement ml
        };

        window.showSection = (id) => {
            document.getElementById('section-devis').classList.toggle('hidden', id !== 'devis');
            document.getElementById('section-history').classList.toggle('hidden', id !== 'history');
        };

        window.genererDevisPro = async () => {
            const name = document.getElementById('clientName').value;
            const addr = document.getElementById('clientAddress').value;
            const qPrepa = parseFloat(document.getElementById('qty_prepa').value) || 0;
            const qSoub = parseFloat(document.getElementById('qty_soub').value) || 0;
            const qFacade = parseFloat(document.getElementById('qty_facade').value) || 0;
            const qEbra = parseFloat(document.getElementById('qty_ebra').value) || 0;

            if(!name) return alert("Nom du client obligatoire");

            const totalHT = (qPrepa*PRIX.prepa) + (qSoub*PRIX.soub) + (qFacade*PRIX.facade) + (qEbra*PRIX.ebra);
            const dateStr = new Date().toLocaleDateString('fr-FR');

            const texte = `🏗️ *DEVIS ISOL-PRESTIGE*
------------------------------
*CLIENT :* ${name}
*LIEU :* ${addr}
*DATE :* ${dateStr}

*DETAIL DES POSTES :*
${qPrepa > 0 ? `• Echafaudage/Protec : ${qPrepa}m² x ${PRIX.prepa}€` : ''}
${qSoub > 0 ? `• Soubassement 180mm : ${qSoub}m² x ${PRIX.soub}€` : ''}
${qFacade > 0 ? `• Façade Graphite STO : ${qFacade}m² x ${PRIX.facade}€` : ''}
${qEbra > 0 ? `• Ebrasements fenêtres : ${qEbra}ml x ${PRIX.ebra}€` : ''}

------------------------------
*TOTAL ESTIMÉ : ${totalHT.toFixed(2)}€ HT*
------------------------------
_Conditions : 30% acompte, 60% cours, 10% fin._`;

            document.getElementById('summaryText').innerText = texte;
            document.getElementById('resultat').classList.remove('hidden');
            window.lastEstimation = texte;

            // Sauvegarde Cloud
            await addDoc(collection(db, "devis_pro"), {
                client: name,
                total: totalHT,
                date: dateStr,
                timestamp: Date.now()
            });
        };

        // Historique
        const q = query(collection(db, "devis_pro"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const histList = document.getElementById('historyList');
            histList.innerHTML = "";
            snapshot.forEach((d) => {
                const data = d.data();
                histList.innerHTML += `
                <div class="bg-white p-4 rounded shadow-sm border-r-4 border-orange-500">
                    <div class="font-bold">${data.client}</div>
                    <div class="text-orange-600 font-mono text-lg">${data.total.toFixed(2)}€ HT</div>
                    <div class="text-xs text-gray-400">${data.date}</div>
                </div>`;
            });
        });

        window.sendWhatsApp = () => {
            window.open("https://wa.me/?text=" + encodeURIComponent(window.lastEstimation), '_blank');
        };
    </script>
</body>
</html>
