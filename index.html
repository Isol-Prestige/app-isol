<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISOL-PRESTIGE | Expert System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 4px solid #f97316; color: #f97316; font-weight: bold; }
        #login-screen { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center">
            <h1 class="text-2xl font-black mb-2 text-slate-800 tracking-tighter">ISOL<span class="text-orange-500">-</span>PRESTIGE</h1>
            <p class="text-gray-400 text-sm mb-8 uppercase tracking-widest font-bold">Accès Restreint</p>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="E-mail" class="w-full p-4 bg-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-orange-500">
                <input type="password" id="loginPass" placeholder="Mot de passe" class="w-full p-4 bg-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-orange-500">
                <button onclick="handleLogin()" class="w-full bg-orange-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-orange-700 transition-all">SE CONNECTER</button>
                <p id="loginError" class="text-red-500 text-xs hidden pt-2">Identifiants incorrects.</p>
            </div>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header class="bg-slate-900 text-white sticky top-0 z-50 shadow-2xl">
            <div class="container mx-auto px-4 py-4 flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-black tracking-tighter">ISOL<span class="text-orange-500">-</span>PRESTIGE</h1>
                </div>
                <button onclick="handleLogout()" class="text-xs border border-slate-700 px-3 py-1 rounded-lg text-slate-400">DÉCONNEXION</button>
            </div>
            <div class="flex border-t border-slate-800">
                <button onclick="showSection('devis')" id="tab-devis" class="flex-1 py-3 text-xs uppercase active-tab">Devis</button>
                <button onclick="showSection('clients')" id="tab-clients" class="flex-1 py-3 text-xs uppercase">Clients</button>
                <button onclick="showSection('reglages')" id="tab-reglages" class="flex-1 py-3 text-xs uppercase text-orange-400">Tarifs</button>
            </div>
        </header>

        <main class="container mx-auto px-4 py-6 max-w-2xl">
            <section id="section-devis" class="space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-lg">
                    <h2 class="text-lg font-bold mb-4">Identification Chantier</h2>
                    <div class="space-y-3">
                        <input type="text" id="clientName" placeholder="Nom du Client" class="w-full bg-slate-50 p-4 rounded-xl">
                        <input type="text" id="clientAddress" placeholder="Adresse" class="w-full bg-slate-50 p-4 rounded-xl">
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-lg">
                    <h2 class="text-lg font-bold mb-4 border-b pb-2">Métrés & Prestations</h2>
                    <div id="itemsContainer" class="space-y-4">
                        <p class="text-center text-gray-400">Chargement...</p>
                    </div>
                    <button onclick="genererDevisPro()" class="w-full bg-orange-600 text-white font-black py-5 rounded-2xl shadow-xl mt-8 uppercase">Calculer & Enregistrer</button>
                </div>

                <div id="resultat" class="hidden bg-slate-900 text-white p-6 rounded-2xl border-2 border-orange-500">
                    <div id="summaryText" class="text-sm font-mono whitespace-pre-line mb-6"></div>
                    <button onclick="sendWhatsApp()" class="w-full bg-green-600 py-4 rounded-xl font-bold">ENVOYER WHATSAPP</button>
                </div>
            </section>

            <section id="section-clients" class="hidden space-y-4">
                <div id="historyList" class="space-y-3"></div>
            </section>

            <section id="section-reglages" class="hidden space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-lg">
                    <input type="hidden" id="editId">
                    <input type="text" id="itemLabel" placeholder="Désignation" class="w-full border p-3 rounded-lg mb-2">
                    <div class="flex gap-2 mb-2">
                        <input type="number" id="itemPrice" placeholder="Prix HT" class="flex-1 border p-3 rounded-lg">
                        <select id="itemUnit" class="border p-3 rounded-lg"><option value="m²">m²</option><option value="ml">ml</option><option value="U">U</option></select>
                    </div>
                    <button onclick="saveItem()" id="btnSaveItem" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold">Enregistrer Tarif</button>
                </div>
                <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
                    <table class="w-full text-xs text-left"><tbody id="itemsTable"></tbody></table>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBeSwiReLvYaV47FSQKLTGEo0ynA8gM1f8",
            authDomain: "app-isol.firebaseapp.com",
            projectId: "app-isol",
            storageBucket: "app-isol.firebasestorage.app",
            messagingSenderId: "49748280512",
            appId: "1:49748280512:web:76e89909bf358434689925"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentPrices = [];

        // --- EXPOSITION DES FONCTIONS AU WINDOW (CRUCIAL) ---
        window.handleLogin = () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            signInWithEmailAndPassword(auth, email, pass).catch(e => document.getElementById('loginError').classList.remove('hidden'));
        };

        window.handleLogout = () => signOut(auth).then(() => location.reload());

        window.showSection = (id) => {
            ['devis', 'clients', 'reglages'].forEach(s => {
                document.getElementById('section-'+s).classList.add('hidden');
                document.getElementById('tab-'+s).classList.remove('active-tab');
            });
            document.getElementById('section-'+id).classList.remove('hidden');
            document.getElementById('tab-'+id).classList.add('active-tab');
        };

        window.startVoice = (inputId) => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Votre navigateur ne supporte pas la dictée vocale.");
            const recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR';
            recognition.onstart = () => { document.querySelector(`[onclick="startVoice('${inputId}')"]`).classList.add('bg-red-500', 'animate-pulse'); };
            recognition.onend = () => { document.querySelector(`[onclick="startVoice('${inputId}')"]`).classList.remove('bg-red-500', 'animate-pulse'); };
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                const val = text.replace(/[^0-9,.]/g, '').replace(',', '.');
                document.getElementById(inputId).value = val;
            };
            recognition.start();
        };

        // --- ÉCOUTE AUTH ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                initApp();
            }
        });

        function initApp() {
            onSnapshot(collection(db, "prestations"), (snap) => {
                const container = document.getElementById('itemsContainer');
                const table = document.getElementById('itemsTable');
                container.innerHTML = ""; table.innerHTML = ""; currentPrices = [];
                snap.forEach(d => {
                    const item = d.data(); currentPrices.push({id: d.id, ...item});
                    // Ligne dans réglages
                    table.innerHTML += `<tr class="border-t"><td class="p-3"><b>${item.nom}</b></td><td class="p-3 text-right">${item.prix}€</td><td class="p-3 text-center"><button onclick="deleteItem('${d.id}')" class="text-red-500">X</button></td></tr>`;
                    // Bloc dans Devis avec Micro
                    container.innerHTML += `
                    <div class="bg-slate-50 p-4 rounded-xl flex items-center justify-between border border-slate-200">
                        <div class="flex-1"><p class="text-sm font-bold">${item.nom}</p><p class="text-[10px] text-gray-400">${item.prix}€ / ${item.unite}</p></div>
                        <div class="flex items-center gap-2">
                            <input type="number" id="input-${d.id}" data-id="${d.id}" placeholder="0" class="qty-input w-16 p-2 border rounded-lg text-center font-bold">
                            <button onclick="startVoice('input-${d.id}')" class="p-2 bg-slate-200 rounded-lg text-lg">🎤</button>
                        </div>
                    </div>`;
                });
            });

            onSnapshot(query(collection(db, "archives_devis"), orderBy("timestamp", "desc")), (snap) => {
                const list = document.getElementById('historyList');
                list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `<div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center border-l-4 border-orange-500">
                        <div><p class="font-bold text-xs uppercase">${data.client}</p><p class="text-orange-600 font-bold">${data.total.toLocaleString()}€ HT</p></div>
                        <button onclick="deleteDevis('${d.id}')" class="text-red-400 text-[10px]">SUPPRIMER</button>
                    </div>`;
                });
            });
        }

        // --- ACTIONS DB ---
        window.saveItem = async () => {
            const label = document.getElementById('itemLabel').value;
            const price = parseFloat(document.getElementById('itemPrice').value);
            const unit = document.getElementById('itemUnit').value;
            if(!label || isNaN(price)) return;
            await addDoc(collection(db, "prestations"), { nom: label, prix: price, unite: unit });
            document.getElementById('itemLabel').value = ""; document.getElementById('itemPrice').value = "";
        };

        window.deleteItem = async (id) => { if(confirm("Supprimer ?")) await deleteDoc(doc(db, "prestations", id)); };
        window.deleteDevis = async (id) => { if(confirm("Supprimer ?")) await deleteDoc(doc(db, "archives_devis", id)); };

        window.genererDevisPro = async () => {
            const name = document.getElementById('clientName').value;
            if(!name) return alert("Nom requis");
            let total = 0; let detail = "";
            document.querySelectorAll('.qty-input').forEach(input => {
                const qte = parseFloat(input.value) || 0;
                if(qte > 0) {
                    const p = currentPrices.find(x => x.id === input.dataset.id);
                    const st = qte * p.prix; total += st;
                    detail += `✅ ${p.nom}\n   ${qte} ${p.unite} x ${p.prix}€ = ${st.toFixed(2)}€ HT\n\n`;
                }
            });
            const res = `🏗️ *ISOL-PRESTIGE*\n*CLIENT :* ${name}\n\n${detail}*TOTAL : ${total.toLocaleString()}€ HT*`;
            document.getElementById('summaryText').innerText = res;
            document.getElementById('resultat').classList.remove('hidden');
            window.lastEstimation = res;
            await addDoc(collection(db, "archives_devis"), { client: name, total: total, timestamp: Date.now() });
        };

        window.sendWhatsApp = () => window.open("https://wa.me/?text=" + encodeURIComponent(window.lastEstimation));
    </script>
</body>
</html>
