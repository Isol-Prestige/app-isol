<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISOL-PRESTIGE</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
.active-tab { border-bottom: 4px solid #f97316; color: #f97316; font-weight: bold; }
#login-screen { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
</style>
</head>

<body class="bg-gray-100 min-h-screen">

<!-- LOGIN -->
<div id="login-screen" class="fixed inset-0 flex items-center justify-center">
<div class="bg-white p-6 rounded-xl w-80">
<input id="loginEmail" placeholder="Email" class="w-full p-3 mb-2 bg-gray-100 rounded">
<input id="loginPass" type="password" placeholder="Password" class="w-full p-3 mb-4 bg-gray-100 rounded">
<button onclick="handleLogin()" class="w-full bg-orange-600 text-white p-3 rounded">Login</button>
<p id="loginError" class="text-red-500 hidden text-sm mt-2">Erreur</p>
</div>
</div>

<div id="app-content" class="hidden">

<header class="bg-slate-900 text-white p-4 flex justify-between">
<h1>ISOL-PRESTIGE</h1>
<button onclick="handleLogout()">Logout</button>
</header>

<div class="flex">
<button onclick="showSection('devis')" id="tab-devis" class="flex-1 p-2 active-tab">Devis</button>
<button onclick="showSection('clients')" id="tab-clients" class="flex-1 p-2">Clients</button>
<button onclick="showSection('reglages')" id="tab-reglages" class="flex-1 p-2">Tarifs</button>
</div>

<main class="p-4 max-w-xl mx-auto">

<!-- DEVIS -->
<section id="section-devis">

<div class="bg-white p-4 mb-4 rounded">
<input id="clientName" placeholder="Nom client" class="w-full p-3 mb-2 bg-gray-100 rounded">
<input id="clientAddress" placeholder="Adresse" class="w-full p-3 bg-gray-100 rounded">
</div>

<!-- MODULE FACADE -->
<div class="bg-white p-4 mb-4 rounded">
<h2 class="font-bold mb-2">Calcul façade</h2>

<select id="facadeType" class="w-full p-2 mb-2 bg-gray-100 rounded">
<option value="rectangle">Façade simple</option>
<option value="pignon">Façade pignon</option>
</select>

<div class="grid grid-cols-2 gap-2">
<input id="facadeL" type="number" placeholder="Largeur" class="p-2 bg-gray-100 rounded">
<input id="facadeH" type="number" placeholder="Hauteur" class="p-2 bg-gray-100 rounded">
</div>

<input id="facadeHp" type="number" placeholder="Hauteur pignon" class="p-2 bg-gray-100 rounded mt-2 hidden">

<button onclick="calculerSurface()" class="w-full mt-2 bg-slate-800 text-white p-2 rounded">Calculer</button>
<p id="surfaceResult" class="mt-2 text-orange-600 font-bold"></p>
</div>

<!-- PRESTATIONS -->
<div class="bg-white p-4 rounded">
<div id="itemsContainer"></div>
<button onclick="genererDevisPro()" class="w-full mt-4 bg-orange-600 text-white p-3 rounded">
Générer devis
</button>
</div>

<div id="resultat" class="hidden bg-slate-900 text-white p-4 mt-4 rounded">
<pre id="summaryText"></pre>
<button onclick="sendWhatsApp()" class="w-full bg-green-600 mt-3 p-3 rounded">
Envoyer WhatsApp
</button>
</div>

</section>

<!-- CLIENTS -->
<section id="section-clients" class="hidden">
<div id="historyList"></div>
</section>

<!-- TARIFS -->
<section id="section-reglages" class="hidden">

<div class="bg-white p-4 mb-4 rounded">
<input id="itemLabel" placeholder="Nom" class="w-full p-2 mb-2 border">
<input id="itemPrice" placeholder="Prix" type="number" class="w-full p-2 mb-2 border">
<select id="itemUnit" class="w-full p-2 border">
<option value="m²">m²</option>
<option value="ml">ml</option>
<option value="U">U</option>
</select>
<button onclick="saveItem()" class="w-full mt-2 bg-black text-white p-2 rounded">Ajouter</button>
</div>

<div id="itemsTable"></div>

</section>

</main>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({ apiKey:"xxx",authDomain:"xxx",projectId:"xxx" });
const auth = getAuth(app);
const db = getFirestore(app);

let currentPrices=[];
let lastSurface=0;

window.handleLogin = () => {
    const email = document.getElementById("loginEmail").value;
    const pass = document.getElementById("loginPass").value;

    signInWithEmailAndPassword(auth, email, pass)
        .then(() => {
            console.log("Connexion OK");
        })
        .catch((error) => {
            console.error("ERREUR FIREBASE :", error);
            document.getElementById("loginError").innerText = error.message;
            document.getElementById("loginError").classList.remove("hidden");
        });
};

onAuthStateChanged(auth,user=>{
if(user){
document.getElementById("login-screen").style.display="none";
document.getElementById("app-content").classList.remove("hidden");
init();
}
});

function init(){

onSnapshot(collection(db,"prestations"),snap=>{
itemsContainer.innerHTML="";
itemsTable.innerHTML="";
currentPrices=[];

snap.forEach(d=>{
let item=d.data();
currentPrices.push({id:d.id,...item});

itemsContainer.innerHTML+=`
<div class="flex justify-between border-b p-2">
<span>${item.nom}</span>
<input type="number" data-id="${d.id}" class="qty-input w-16 border text-center">
</div>`;

itemsTable.innerHTML+=`
<div class="flex justify-between border-b p-2">
<span>${item.nom} (${item.prix}€/${item.unite})</span>
<button onclick="deleteItem('${d.id}')" class="text-red-500">X</button>
</div>`;
});
});

onSnapshot(query(collection(db,"archives_devis"),orderBy("date","desc")),snap=>{
historyList.innerHTML="";
snap.forEach(d=>{
let data=d.data();
historyList.innerHTML+=`
<div class="bg-white p-3 mb-2 flex justify-between">
<div>${data.client} - ${data.total}€</div>
<button onclick="deleteDevis('${d.id}')">X</button>
</div>`;
});
});

}

window.saveItem=async()=>{
await addDoc(collection(db,"prestations"),{
nom:itemLabel.value,
prix:parseFloat(itemPrice.value),
unite:itemUnit.value
});
};

window.deleteItem=id=>deleteDoc(doc(db,"prestations",id));
window.deleteDevis=id=>deleteDoc(doc(db,"archives_devis",id));

window.calculerSurface=()=>{
let L=+facadeL.value||0;
let H=+facadeH.value||0;
let Hp=+facadeHp.value||0;

let surface = facadeType.value==="pignon"
? (L*H)+(L*Hp/2)
: L*H;

lastSurface=surface.toFixed(2);
surfaceResult.innerText="Surface : "+lastSurface+" m²";

document.querySelectorAll(".qty-input").forEach(i=>{
let p=currentPrices.find(x=>x.id===i.dataset.id);
if(p.unite==="m²") i.value=lastSurface;
});
};

facadeType.addEventListener("change",()=>{
facadeHp.classList.toggle("hidden",facadeType.value!=="pignon");
});

window.genererDevisPro=async()=>{
let total=0,detail="";

document.querySelectorAll(".qty-input").forEach(i=>{
let q=+i.value||0;
if(q>0){
let p=currentPrices.find(x=>x.id===i.dataset.id);
let st=q*p.prix;
total+=st;
detail+=`${p.nom} ${q} x ${p.prix}€ = ${st}€\n`;
}
});

let txt=`ISOL-PRESTIGE
Client : ${clientName.value}

Surface : ${lastSurface} m²

${detail}

TOTAL : ${total}€ HT`;

summaryText.innerText=txt;
resultat.classList.remove("hidden");

window.lastEstimation=txt;

await addDoc(collection(db,"archives_devis"),{
client:clientName.value,
total,
surface:lastSurface,
date:Date.now()
});
};

window.sendWhatsApp=()=>window.open("https://wa.me/?text="+encodeURIComponent(lastEstimation));

</script>

</body>
</html>
